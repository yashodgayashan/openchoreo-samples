apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: auth-service

endpoints:
  - name: auth-api
    port: 8082
    type: HTTP

dependencies:
  endpoints:
    - component: lab-postgres
      name: postgres
      visibility: project
      envBindings:
        address: _
    - component: lab-redis
      name: redis
      visibility: project
      envBindings:
        address: REDIS_ADDR

configurations:
  env:
    - name: PORT
      value: "8082"
    - name: POSTGRES_DSN
      value: "postgres://postgres:postgres@lab-postgres:5432/notes?sslmode=disable"
    - name: OTEL_ENABLED
      value: "true"
    - name: OTEL_EXPORTER_ENDPOINT
      value: "http://opentelemetry-collector.openchoreo-observability-plane.svc.cluster.local:4318"
