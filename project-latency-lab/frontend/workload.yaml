apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: frontend

endpoints:
  - name: webapp
    port: 3000
    type: HTTP
    visibility:
      - external

dependencies:
  endpoints:
    - component: lab-api-service
      name: api
      visibility: project
      envBindings:
        address: API_SERVICE_URL
    - component: lab-analytics-service
      name: analytics-api
      visibility: project
      envBindings:
        address: ANALYTICS_SERVICE_URL
    - component: lab-auth-service
      name: auth-api
      visibility: project
      envBindings:
        address: AUTH_SERVICE_URL

configurations:
  env:
    - name: PORT
      value: "3000"
    - name: OTEL_ENABLED
      value: "true"
    - name: OTEL_EXPORTER_ENDPOINT
      value: "http://opentelemetry-collector.openchoreo-observability-plane.svc.cluster.local:4318"
