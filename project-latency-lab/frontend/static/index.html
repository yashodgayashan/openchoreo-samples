<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Latency Lab — Notes</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { margin-bottom: 0.25rem; }
  .sub { color: #666; margin-top: 0; }
  fieldset { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin: 1rem 0; }
  legend { padding: 0 0.5rem; font-weight: 600; }
  label { display: block; font-size: 0.85rem; color: #555; margin-top: 0.5rem; }
  input, textarea, select, button { font: inherit; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  input, textarea, select { width: 100%; }
  textarea { min-height: 80px; resize: vertical; }
  button { background: #1f6feb; color: white; border: 0; cursor: pointer; padding: 0.5rem 1rem; }
  button.secondary { background: #555; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  pre { background: #f6f8fa; padding: 0.75rem; border-radius: 4px; overflow: auto; font-size: 0.85rem; }
  .note { border: 1px solid #eee; border-radius: 6px; padding: 0.75rem; margin: 0.5rem 0; }
  .meta { color: #888; font-size: 0.8rem; }
</style>
</head>
<body>
  <h1>Latency Lab</h1>
  <p class="sub">Notes service with conditional latency / fault injection.</p>

  <fieldset>
    <legend>Latency knobs (apply to every request below)</legend>
    <div class="row">
      <div>
        <label>delay_ms</label>
        <input id="delay_ms" type="number" min="0" max="30000" placeholder="0" />
      </div>
      <div>
        <label>delay_stage</label>
        <select id="delay_stage">
          <option value="">(default: handler)</option>
          <option value="handler">handler</option>
          <option value="cache">cache</option>
          <option value="db">db</option>
          <option value="all">all</option>
        </select>
      </div>
      <div>
        <label>fail_rate (0–1)</label>
        <input id="fail_rate" type="number" step="0.05" min="0" max="1" placeholder="0" />
      </div>
    </div>
  </fieldset>

  <fieldset>
    <legend>Create note</legend>
    <label>Author</label>
    <input id="author" value="alice" />
    <label>Body</label>
    <textarea id="body">hello latency lab</textarea>
    <p><button onclick="createNote()">POST /api/notes</button></p>
  </fieldset>

  <fieldset>
    <legend>List / fetch</legend>
    <p>
      <button onclick="listNotes()">GET /api/notes</button>
      <button class="secondary" onclick="topNotes()">GET /api/analytics/top</button>
    </p>
    <div id="notes"></div>
  </fieldset>

  <fieldset>
    <legend>Last response</legend>
    <pre id="out">(none)</pre>
  </fieldset>

<script>
function qs() {
  const params = new URLSearchParams();
  const d = document.getElementById('delay_ms').value;
  const s = document.getElementById('delay_stage').value;
  const f = document.getElementById('fail_rate').value;
  if (d) params.set('delay_ms', d);
  if (s) params.set('delay_stage', s);
  if (f) params.set('fail_rate', f);
  const q = params.toString();
  return q ? '?' + q : '';
}

async function call(method, path, body) {
  const t0 = performance.now();
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const url = path + qs();
  const r = await fetch(url, opts);
  const ms = Math.round(performance.now() - t0);
  let data;
  try { data = await r.json(); } catch { data = null; }
  document.getElementById('out').textContent =
    `${method} ${url}\n→ ${r.status} (${ms} ms)\n` + JSON.stringify(data, null, 2);
  return { status: r.status, data };
}

async function createNote() {
  const author = document.getElementById('author').value;
  const body   = document.getElementById('body').value;
  await call('POST', '/api/notes', { author, body });
  listNotes();
}

async function listNotes() {
  const { data } = await call('GET', '/api/notes');
  render(data || []);
}

async function topNotes() {
  const { data } = await call('GET', '/api/analytics/top');
  render(data || [], true);
}

function render(items, isTop = false) {
  const el = document.getElementById('notes');
  if (!items.length) { el.innerHTML = '<p class="meta">no notes</p>'; return; }
  el.innerHTML = items.map(n => `
    <div class="note">
      <div><strong>${n.author || '?'}</strong> · <code>${n.id}</code> · views: ${n.view_count ?? 0}</div>
      <div>${(n.body || '').replace(/[<&]/g, c => ({'<':'&lt;','&':'&amp;'}[c]))}</div>
      <div class="meta">
        <a href="#" onclick="getNote('${n.id}'); return false;">view</a> ·
        <a href="#" onclick="stats('${n.id}'); return false;">stats</a>${isTop ? '' : ` ·
        <a href="#" onclick="del('${n.id}'); return false;">delete</a>`}
      </div>
    </div>`).join('');
}

async function getNote(id) { await call('GET', '/api/notes/' + id); }
async function stats(id)   { await call('GET', '/api/analytics/' + id); }
async function del(id)     { await call('DELETE', '/api/notes/' + id); listNotes(); }
</script>
</body>
</html>
